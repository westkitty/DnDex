<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DM Hub Tactical System & Workflow Audit</title>
  <style>
    :root {
      --bg-0:#04040a; --bg-1:#080712; --panel:rgba(16,14,28,.72); --panel-strong:rgba(20,18,34,.94);
      --glass:rgba(255,255,255,.075); --glass-border:rgba(255,255,255,.16);
      --text:#f6f4ff; --muted:#b9b4cf; --soft:#85809c;
      --purple:#6366f1; --purple-2:#a855f7; --crimson:#b91c1c; --crimson-2:#ef4444; --amber:#f59e0b; --ok:#22c55e;
      --shadow:0 28px 90px rgba(0,0,0,.55); --glow:0 0 32px rgba(99,102,241,.55); --radius-xl:28px;
    }
    * { box-sizing:border-box; }
    html, body {
      min-height:100%; margin:0; color:var(--text);
      font-family:Inter,Roboto,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 16% 18%,rgba(99,102,241,.28),transparent 30%),
        radial-gradient(circle at 82% 22%,rgba(185,28,28,.18),transparent 30%),
        radial-gradient(circle at 50% 88%,rgba(168,85,247,.20),transparent 34%),
        linear-gradient(135deg,var(--bg-0),var(--bg-1) 45%,#0d0712);
      overflow-x:hidden;
    }
    body:before, body:after { content:""; position:fixed; inset:0; pointer-events:none; z-index:0; }
    body:before {
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
      background-size:44px 44px;
      mask-image:radial-gradient(circle at center,black,transparent 76%);
    }
    body:after {
      background:linear-gradient(transparent 0 48%,rgba(255,255,255,.028) 50%,transparent 52% 100%);
      background-size:100% 7px; opacity:.28; mix-blend-mode:screen;
    }
    button,input,textarea { font:inherit; }
    .app-shell { position:relative; z-index:1; min-height:100vh; display:grid; place-items:center; padding:28px; }
    .audit-card {
      width:min(1180px,100%); min-height:min(820px,calc(100vh - 56px));
      display:grid; grid-template-rows:auto 1fr auto;
      border:1px solid var(--glass-border);
      background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.035));
      border-radius:var(--radius-xl); box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(26px); overflow:hidden;
    }
    .topbar { padding:24px 26px 18px; border-bottom:1px solid rgba(255,255,255,.1); background:rgba(8,7,18,.64); }
    .brand-row { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
    .brand-lockup { display:flex; align-items:center; gap:14px; min-width:0; }
    .sigil {
      width:48px; height:48px; display:grid; place-items:center; border-radius:16px;
      background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.25),transparent 32%),
        linear-gradient(135deg,rgba(99,102,241,.95),rgba(168,85,247,.78),rgba(185,28,28,.78));
      box-shadow:var(--glow); border:1px solid rgba(255,255,255,.22); flex:0 0 auto;
    }
    .sigil svg { width:28px; height:28px; filter:drop-shadow(0 4px 8px rgba(0,0,0,.35)); }
    .eyebrow { margin:0 0 4px; color:#c9c5ff; text-transform:uppercase; letter-spacing:.18em; font-size:.72rem; font-weight:800; }
    .brand-title { margin:0; font-size:clamp(1.2rem,2.2vw,1.65rem); line-height:1.05; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .status-tools { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; align-items:center; }
    .status-chip,.enter-chip {
      display:inline-flex; align-items:center; gap:8px; padding:10px 13px; border-radius:999px; white-space:nowrap; font-size:.82rem; font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }
    .status-chip { border:1px solid rgba(99,102,241,.36); background:rgba(99,102,241,.1); color:#dcd9ff; }
    .enter-chip { border:1px solid rgba(245,158,11,.42); background:rgba(245,158,11,.11); color:#fde7b1; }
    .keycap {
      display:inline-grid; place-items:center; min-width:28px; height:24px; padding:0 8px; border-radius:7px;
      border:1px solid rgba(255,255,255,.22); background:rgba(0,0,0,.34); color:white; font-weight:950; box-shadow:inset 0 -2px 0 rgba(255,255,255,.08);
    }
    .pulse-dot { width:9px; height:9px; border-radius:999px; background:var(--ok); box-shadow:0 0 18px rgba(34,197,94,.75); animation:pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.35);opacity:.55} }
    .progress-wrap { display:grid; gap:8px; }
    .progress-meta { display:flex; justify-content:space-between; gap:12px; color:var(--muted); font-size:.82rem; font-weight:800; }
    .progress-track { height:12px; overflow:hidden; border-radius:999px; border:1px solid rgba(255,255,255,.11); background:rgba(255,255,255,.07); box-shadow:inset 0 0 18px rgba(0,0,0,.45); }
    .progress-fill { height:100%; width:0%; border-radius:inherit; background:linear-gradient(90deg,var(--purple),var(--purple-2),var(--crimson-2)); box-shadow:0 0 24px rgba(99,102,241,.78),0 0 42px rgba(168,85,247,.35); transition:width 460ms cubic-bezier(.2,.8,.2,1); position:relative; overflow:hidden; }
    .progress-fill:after { content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.34),transparent); transform:translateX(-100%); animation:sweep 2.4s linear infinite; }
    @keyframes sweep { to{transform:translateX(100%)} }
    .slide-stage { position:relative; display:grid; align-items:stretch; padding:28px; min-height:0; }
    .slide,.summary-layout { display:grid; grid-template-columns:minmax(0,1fr) 390px; gap:26px; align-items:stretch; animation:slideIn 420ms cubic-bezier(.2,.85,.2,1) both; }
    @keyframes slideIn { from{opacity:0;transform:translateX(28px) scale(.985);filter:blur(5px)} to{opacity:1;transform:translateX(0) scale(1);filter:blur(0)} }
    .question-panel,.scene-panel,.summary-panel,.summary-side {
      border:1px solid var(--glass-border); border-radius:var(--radius-xl);
      background:linear-gradient(145deg,rgba(14,13,24,.84),rgba(21,18,35,.58));
      box-shadow:0 24px 70px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
    }
    .question-panel { padding:clamp(24px,5vw,48px); display:grid; align-content:center; position:relative; overflow:hidden; }
    .question-panel:before { content:""; position:absolute; width:300px; height:300px; border-radius:50%; right:-120px; top:-120px; background:radial-gradient(circle,rgba(99,102,241,.24),transparent 70%); }
    .section-pill { position:relative; display:inline-flex; width:fit-content; align-items:center; gap:8px; padding:9px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.07); color:#e8e5ff; font-weight:900; font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; margin-bottom:16px; }
    .section-pill:before { content:""; width:8px; height:8px; border-radius:999px; background:var(--crimson-2); box-shadow:0 0 12px rgba(239,68,68,.72); }
    .slide-kicker { position:relative; color:#c6c3ff; text-transform:uppercase; letter-spacing:.2em; font-size:.78rem; font-weight:900; margin-bottom:18px; }
    .question-title { position:relative; margin:0; font-size:clamp(2rem,5vw,4.35rem); line-height:.95; letter-spacing:-.06em; font-weight:950; }
    .question-copy { position:relative; margin:20px 0 0; max-width:760px; color:var(--muted); font-size:clamp(1.02rem,1.8vw,1.24rem); line-height:1.55; font-weight:560; }
    .answer-zone { position:relative; margin-top:34px; display:grid; gap:16px; }
    .text-input,.summary-output {
      width:100%; border:1px solid rgba(255,255,255,.15); border-radius:18px; color:var(--text); background:rgba(255,255,255,.075);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 14px 45px rgba(0,0,0,.24); outline:none;
      transition:border-color 180ms ease,box-shadow 180ms ease,background 180ms ease;
    }
    .text-input { min-height:60px; padding:0 18px; font-size:1.02rem; font-weight:650; }
    .text-input::placeholder { color:rgba(246,244,255,.42); }
    .text-input:focus,.summary-output:focus { border-color:rgba(99,102,241,.78); box-shadow:0 0 0 4px rgba(99,102,241,.18),0 18px 55px rgba(0,0,0,.3); background:rgba(255,255,255,.1); }
    .choice-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:13px; }
    .choice-btn {
      border:1px solid rgba(255,255,255,.14); border-radius:18px; min-height:78px; padding:15px; color:var(--text); background:rgba(255,255,255,.07);
      cursor:pointer; text-align:left; font-weight:850; box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 14px 42px rgba(0,0,0,.18);
      transition:transform 160ms ease,border-color 160ms ease,background 160ms ease,box-shadow 160ms ease;
    }
    .choice-btn small { display:block; margin-top:6px; color:var(--soft); font-weight:700; line-height:1.3; }
    .choice-btn:hover { transform:translateY(-2px); border-color:rgba(168,85,247,.58); background:rgba(99,102,241,.14); box-shadow:0 0 0 4px rgba(99,102,241,.12),0 18px 48px rgba(0,0,0,.26); }
    .choice-btn.selected { border-color:rgba(99,102,241,.95); background:linear-gradient(135deg,rgba(99,102,241,.34),rgba(168,85,247,.16)); box-shadow:0 0 0 4px rgba(99,102,241,.16),var(--glow); }
    .hint-line,.keyboard-line { color:var(--soft); font-size:.92rem; line-height:1.45; margin:0; }
    .keyboard-line { display:flex; align-items:center; gap:9px; flex-wrap:wrap; color:#f2dfae; font-weight:850; }
    .scene-panel { padding:16px; display:grid; grid-template-rows:minmax(260px,1fr) auto; gap:14px; overflow:hidden; min-height:560px; position:relative; }
    .scene-card { position:relative; overflow:hidden; border-radius:22px; border:1px solid rgba(255,255,255,.13); background:#080712; box-shadow:inset 0 1px 0 rgba(255,255,255,.08); }
    .scene-card img { width:100%; height:100%; object-fit:cover; display:block; filter:saturate(1.05) contrast(1.04); transform:scale(1.01); }
    .scene-card:after { content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 40%,rgba(4,4,10,.86)), radial-gradient(circle at 30% 20%,rgba(99,102,241,.18),transparent 42%); pointer-events:none; }
    .scene-badge { position:absolute; left:14px; top:14px; z-index:2; display:inline-flex; align-items:center; gap:8px; padding:8px 11px; border-radius:999px; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.45); backdrop-filter:blur(12px); color:#fff; font-size:.78rem; font-weight:950; letter-spacing:.08em; text-transform:uppercase; }
    .scene-badge:before { content:""; width:8px; height:8px; border-radius:999px; background:var(--purple-2); box-shadow:0 0 14px rgba(168,85,247,.9); }
    .guide-copy { padding:16px; border-radius:20px; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.25); }
    .guide-copy p { margin:0; color:#dedbff; line-height:1.45; font-size:.98rem; font-weight:650; }
    .guide-copy strong { color:white; }
    .footer-actions { display:flex; justify-content:space-between; align-items:center; gap:16px; padding:18px 26px 26px; border-top:1px solid rgba(255,255,255,.1); background:rgba(8,7,18,.56); }
    .button-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .btn {
      border:1px solid rgba(255,255,255,.14); border-radius:16px; min-height:48px; padding:0 18px; color:var(--text); background:rgba(255,255,255,.075);
      font-weight:850; cursor:pointer; transition:transform 160ms ease,background 160ms ease,border-color 160ms ease,box-shadow 160ms ease;
    }
    .btn:hover:not(:disabled) { transform:translateY(-2px); background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.25); }
    .btn:disabled { opacity:.42; cursor:not-allowed; }
    .btn.primary { border-color:rgba(99,102,241,.78); background:linear-gradient(135deg,rgba(99,102,241,.95),rgba(168,85,247,.78)); box-shadow:0 0 24px rgba(99,102,241,.38); }
    .btn.primary:hover:not(:disabled) { box-shadow:0 0 34px rgba(99,102,241,.58),0 18px 45px rgba(0,0,0,.28); }
    .btn.crimson { border-color:rgba(239,68,68,.5); background:rgba(185,28,28,.18); }
    .micro-status { color:var(--soft); font-size:.88rem; font-weight:750; line-height:1.35; }
    .summary-panel { padding:clamp(22px,4vw,38px); overflow:hidden; }
    .summary-title { margin:0; font-size:clamp(2rem,4.7vw,4rem); letter-spacing:-.055em; line-height:.98; font-weight:950; }
    .summary-subtitle { margin:16px 0 26px; color:var(--muted); font-size:1.04rem; line-height:1.55; max-width:760px; font-weight:550; }
    .summary-output { min-height:310px; resize:vertical; padding:18px; line-height:1.55; font-weight:650; color:#f7f5ff; }
    .copy-status { min-height:22px; margin-top:12px; color:#bbf7d0; font-size:.92rem; font-weight:800; }
    .summary-side { padding:16px; display:grid; gap:14px; align-content:start; }
    .mini-gallery { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .mini-gallery img { width:100%; aspect-ratio:1.25/1; object-fit:cover; border-radius:14px; border:1px solid rgba(255,255,255,.12); }
    .mini-card { padding:16px; border-radius:18px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.11); }
    .mini-card h3 { margin:0 0 8px; font-size:.94rem; text-transform:uppercase; letter-spacing:.13em; color:#d9d6ff; }
    .mini-card p { margin:0; color:var(--muted); line-height:1.45; font-size:.95rem; font-weight:600; }
    .dragon-runes { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .rune { padding:8px 10px; border-radius:999px; background:rgba(99,102,241,.14); border:1px solid rgba(99,102,241,.28); color:#dfdcff; font-weight:850; font-size:.8rem; }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    @media (max-width:960px) {
      .app-shell { padding:14px; } .audit-card { min-height:calc(100vh - 28px); } .slide,.summary-layout { grid-template-columns:1fr; }
      .scene-panel { min-height:auto; grid-template-rows:340px auto; } .choice-grid { grid-template-columns:1fr; } .brand-row { align-items:flex-start; } .status-tools { display:none; }
    }
    @media (max-width:580px) {
      .topbar,.slide-stage,.footer-actions { padding-left:16px; padding-right:16px; } .brand-title { white-space:normal; }
      .footer-actions { align-items:stretch; flex-direction:column; } .button-row { width:100%; } .btn { flex:1 1 auto; } .question-panel { padding:24px; }
      .scene-panel { grid-template-rows:260px auto; } .mini-gallery { grid-template-columns:1fr; }
    }
    @media (prefers-reduced-motion:reduce) {
      *,*:before,*:after { animation-duration:.01ms!important; animation-iteration-count:1!important; scroll-behavior:auto!important; transition-duration:.01ms!important; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="audit-card" aria-label="DM Hub Tactical System and Workflow Audit">
      <header class="topbar">
        <div class="brand-row">
          <div class="brand-lockup">
            <div class="sigil" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 5l18 10v20c0 10-7.2 19.2-18 24C21.2 54.2 14 45 14 35V15L32 5z" fill="rgba(255,255,255,.9)"/>
                <path d="M32 14l10 6v12c0 5.8-3.7 11.2-10 14-6.3-2.8-10-8.2-10-14V20l10-6z" fill="#11101d"/>
                <path d="M24 31h16M32 22v18" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
              </svg>
            </div>
            <div>
              <p class="eyebrow">Dragon Obsidian Interface</p>
              <h1 class="brand-title">DM Hub Tactical System &amp; Workflow Audit</h1>
            </div>
          </div>
          <div class="status-tools">
            <div class="enter-chip"><span class="keycap">Enter</span> moves forward</div>
            <div class="status-chip" aria-label="audit system online"><span class="pulse-dot"></span> Audit System Online</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progressLabel">Slide 1 of 11</span>
            <span id="progressPercent">9% Complete</span>
          </div>
          <div class="progress-track" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </header>
      <div class="slide-stage" id="stage" aria-live="polite"></div>
      <footer class="footer-actions">
        <div class="micro-status" id="microStatus">Answer the current tactical prompt, then press Enter or click Next.</div>
        <div class="button-row">
          <button class="btn" id="backBtn" type="button">Back</button>
          <button class="btn crimson" id="resetBtn" type="button">Reset</button>
          <button class="btn primary" id="nextBtn" type="button">Next</button>
        </div>
      </footer>
    </section>
  </main>

  <script>
    const questions = [{"id": "device", "section": "Laptop Specs", "label": "Device", "kicker": "Slide 1 \u00b7 Identify your Device", "title": "Name the laptop relic.", "prompt": "What brand and model is your laptop?", "helper": "Example: Apple MacBook Air, Dell XPS 13, HP Pavilion, Lenovo ThinkPad, ASUS Zenbook.", "type": "text", "placeholder": "Type brand and model here...", "guide": "I am checking the inventory parchment. Give me the laptop name, then press Enter to advance."}, {"id": "age", "section": "Laptop Specs", "label": "Machine age", "kicker": "Slide 2 \u00b7 The Age of the Relic", "title": "How ancient is this machine?", "prompt": "Roughly how old is the machine?", "helper": "Choose the closest estimate. Exact purchase records are not required.", "type": "choice", "options": [{"value": "New", "detail": "Recently purchased or basically fresh from the forge."}, {"value": "1-2 years", "detail": "Battle-tested, but still young."}, {"value": "3+ years", "detail": "Veteran hardware with stories and probably fan dust."}], "guide": "Pick the age tier, then press Enter. The audit dragon accepts estimates."}, {"id": "os", "section": "Laptop Specs", "label": "Operating system", "kicker": "Slide 3 \u00b7 Command Center", "title": "Choose the command center.", "prompt": "Is it running Windows or macOS?", "helper": "Pick the operating system the laptop uses most of the time.", "type": "choice", "options": [{"value": "Windows", "detail": "The classic many-windowed castle."}, {"value": "macOS", "detail": "The polished silver tower."}, {"value": "Other / Unsure", "detail": "Linux, ChromeOS, or mysterious wizard machinery."}], "guide": "Operating system selected. Press Enter to continue the platform ritual."}, {"id": "display", "section": "Laptop Specs", "label": "Display setup", "kicker": "Slide 4 \u00b7 Battlefield View", "title": "Survey the battlefield view.", "prompt": "Do you typically plug it into an external monitor during games, or do you just use the laptop screen?", "helper": "This helps DM Hub understand screen space and layout comfort.", "type": "choice", "options": [{"value": "Laptop screen only", "detail": "One portable battle map."}, {"value": "External monitor", "detail": "A larger tactical command table."}, {"value": "Both", "detail": "Laptop plus extra display power."}], "guide": "Good. Choose the display setup, then press Enter. Visibility goblins hate clarity."}, {"id": "thermal", "section": "Laptop Specs", "label": "Performance", "kicker": "Slide 5 \u00b7 Thermal Stress", "title": "Listen for the dragon fan.", "prompt": "Does the laptop ever get loud or hot when you're running several things at once?", "helper": "This gives a rough signal about thermal limits and multitasking strain.", "type": "choice", "options": [{"value": "No", "detail": "Quiet as a rogue who paid attention."}, {"value": "Sometimes", "detail": "Occasional fan roar or warm keyboard."}, {"value": "Often", "detail": "The dragon is awake and it wants airflow."}, {"value": "Unsure", "detail": "No clear memory. Suspicious, but allowed."}], "guide": "If the laptop sounds like a wyrmling in a soup pot, write that down. Then press Enter."}, {"id": "touchscreen", "section": "Laptop Specs", "label": "Touchscreen", "kicker": "Slide 6 \u00b7 Tactical Input", "title": "Check for fingertip magic.", "prompt": "Does the laptop have a touchscreen?", "helper": "Touch input can affect how comfortable certain controls feel.", "type": "choice", "options": [{"value": "Yes", "detail": "Direct spellcasting on the glass."}, {"value": "No", "detail": "Keyboard and trackpad like the old gods intended."}, {"value": "Unsure", "detail": "We shall mark the rune unknown."}], "guide": "Touchscreen status logged. Pick the rune, then press Enter."}, {"id": "browser", "section": "Laptop Specs", "label": "Browser", "kicker": "Slide 7 \u00b7 Interface Choice", "title": "Select the portal.", "prompt": "Which web browser do you normally use?", "helper": "Choose the browser used most often for web apps and DM Hub sessions.", "type": "choice", "options": [{"value": "Chrome", "detail": "Google's many-tabbed portal."}, {"value": "Safari", "detail": "Apple's polished portal."}, {"value": "Edge", "detail": "Microsoft's portal with opinions."}, {"value": "Firefox", "detail": "The fox portal. Respectable."}, {"value": "Other", "detail": "Brave, Arc, Opera, Vivaldi, or another planar gate."}], "guide": "Final laptop spec selected. Press Enter to enter the DM workflow chamber."}, {"id": "combatPrep", "section": "DM Workflow", "label": "Combat prep", "kicker": "Slide 8 \u00b7 Combat Flow", "title": "Plan the ambush rhythm.", "prompt": "Do you prefer to set up all your monsters before the session, or do you often add enemies in the middle of combat?", "helper": "This tells us whether DM Hub should favor a strong Encounter Builder or an ultra-fast Add Foe button.", "type": "choice", "options": [{"value": "Set up before the session", "detail": "I like the encounter ready before initiative starts."}, {"value": "Add surprise enemies mid-combat", "detail": "I often improvise reinforcements, twists, or sudden problems."}, {"value": "Both", "detail": "I prepare the core fight, then adjust as the battle unfolds."}], "guide": "Combat workflow logged. Choose the real table habit, then press Enter."}, {"id": "healthTransparency", "section": "DM Workflow", "label": "Health transparency", "kicker": "Slide 9 \u00b7 Player View", "title": "Choose what the party sees.", "prompt": "Should players see exact monster HP numbers, or narrative terms like Bloodied or Healthy?", "helper": "This helps decide how the player-facing view should describe combat status.", "type": "choice", "options": [{"value": "Exact HP numbers", "detail": "Players can see numbers like 14/45 HP."}, {"value": "Narrative health terms", "detail": "Players see terms like Healthy, Bloodied, or Near Death."}, {"value": "No monster health shown", "detail": "Players should infer status from narration only.     const stage = document.getElementById("stage");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const progressPercent = document.getElementById("progressPercent");
    const microStatus = document.getElementById("microStatus");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    let currentIndex = 0;
    let answers = {};
    let completed = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getProgressPercent() {
      if (completed) return 100;
      return Math.round(((currentIndex + 1) / questions.length) * 100);
    }

    function updateChrome() {
      const percent = getProgressPercent();
      progressFill.style.width = `${percent}%`;
      progressPercent.textContent = `${percent}% Complete`;
      progressLabel.textContent = completed ? "Final Summary" : `Slide ${currentIndex + 1} of ${questions.length}`;
      backBtn.disabled = currentIndex === 0 && !completed;
      nextBtn.textContent = completed ? "Copy Profile" : currentIndex === questions.length - 1 ? "Finish" : "Next";
      microStatus.textContent = completed
        ? "Profile generated. Copy it and send it back to the DM Hub reviewer."
        : "Answer the current tactical prompt, then press Enter or click Next.";
    }

    function currentScene(questionId) {
      return scenes.find(scene => scene.key === questionId) || scenes[0];
    }

    function renderScene(question) {
      const scene = currentScene(question.id);
      return `
        <aside class="scene-panel" aria-label="Dungeon master scene">
          <div class="scene-card">
            <span class="scene-badge">${escapeHtml(question.label)}</span>
            <img src="${scene.src}" alt="${escapeHtml(scene.alt)}" />
          </div>
          <div class="guide-copy">
            <p><strong>Quest Guide:</strong> ${escapeHtml(question.guide)} <span class="keycap">Enter</span></p>
          </div>
        </aside>
      `;
    }

    function renderAnswerControl(question) {
      const saved = answers[question.id] || "";
      if (question.type === "text") {
        return `
          <input
            class="text-input"
            id="answerInput"
            type="text"
            value="${escapeHtml(saved)}"
            placeholder="${escapeHtml(question.placeholder)}"
            autocomplete="off"
          />
        `;
      }

      return `
        <div class="choice-grid" role="radiogroup" aria-label="${escapeHtml(question.prompt)}">
          ${question.options.map(option => `
            <button
              type="button"
              class="choice-btn ${saved === option.value ? "selected" : ""}"
              data-value="${escapeHtml(option.value)}"
              role="radio"
              aria-checked="${saved === option.value ? "true" : "false"}"
            >
              ${escapeHtml(option.value)}
              <small>${escapeHtml(option.detail)}</small>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderSlide() {
      completed = false;
      const question = questions[currentIndex];
      stage.innerHTML = `
        <section class="slide" key="${question.id}">
          <div class="question-panel">
            <div class="section-pill">${escapeHtml(question.section)}</div>
            <div class="slide-kicker">${escapeHtml(question.kicker)}</div>
            <h2 class="question-title">${escapeHtml(question.title)}</h2>
            <p class="question-copy">${escapeHtml(question.prompt)}</p>
            <div class="answer-zone">
              ${renderAnswerControl(question)}
              <p class="keyboard-line"><span class="keycap">Enter</span> Press Enter to move on after answering.</p>
              <p class="hint-line">${escapeHtml(question.helper)}</p>
            </div>
          </div>
          ${renderScene(question)}
        </section>
      `;
      bindCurrentControls();
      updateChrome();
    }

    function bindCurrentControls() {
      const question = questions[currentIndex];
      const input = document.getElementById("answerInput");
      if (input) {
        input.addEventListener("input", () => {
          answers[question.id] = input.value.trim();
          saveLocal();
        });
        setTimeout(() => input.focus(), 80);
      }

      const choices = stage.querySelectorAll(".choice-btn");
      choices.forEach(button => {
        button.addEventListener("click", () => {
          answers[question.id] = button.dataset.value;
          choices.forEach(choice => {
            choice.classList.remove("selected");
            choice.setAttribute("aria-checked", "false");
          });
          button.classList.add("selected");
          button.setAttribute("aria-checked", "true");
          saveLocal();
          microStatus.textContent = "Answer logged. Press Enter or click Next.";
        });
      });
    }

    function validateCurrent() {
      const question = questions[currentIndex];
      const value = (answers[question.id] || "").trim();
      if (!value) {
        microStatus.textContent = "Missing answer. The audit beast refuses to proceed without data.";
        const panel = stage.querySelector(".question-panel");
        if (panel) {
          panel.animate(
            [
              { transform: "translateX(0)" },
              { transform: "translateX(-8px)" },
              { transform: "translateX(8px)" },
              { transform: "translateX(0)" }
            ],
            { duration: 240, easing: "ease-out" }
          );
        }
        return false;
      }
      return true;
    }

    function buildProfileText() {
      const lines = [
        "TACTICAL SYSTEM & WORKFLOW PROFILE — DM HUB",
        "Generated by the Dragon Obsidian System & Workflow Audit",
        "",
        "Laptop Specs:",
        `Device brand/model: ${answers.device || "Not provided"}`,
        `Machine age: ${answers.age || "Not provided"}`,
        `Operating system: ${answers.os || "Not provided"}`,
        `Display setup: ${answers.display || "Not provided"}`,
        `Thermal behavior under many apps: ${answers.thermal || "Not provided"}`,
        `Touchscreen: ${answers.touchscreen || "Not provided"}`,
        `Primary web browser: ${answers.browser || "Not provided"}`,
        "",
        "DM Workflow:",
        `Combat prep style: ${answers.combatPrep || "Not provided"}`,
        `Player health transparency: ${answers.healthTransparency || "Not provided"}`,
        `Map style: ${answers.mapStyle || "Not provided"}`,
        `Combat note-taking: ${answers.notes || "Not provided"}`,
        "",
        "Notes for DM Hub reviewer:",
        "- Use this profile to estimate layout comfort, browser compatibility, likely performance constraints, and live-session workflow needs.",
        "- Thermal behavior is user-reported and should be treated as a practical warning signal, not a benchmark.",
        "- External monitor use may improve comfort for map-heavy or multitasking-heavy sessions.",
        "- Combat prep answers should guide whether DM Hub emphasizes a robust Encounter Builder or an ultra-fast Add Foe control.",
        "- Health transparency answers should guide Player View export behavior.",
        "- Map style answers should guide large-image optimization versus simple canvas sketch tooling.",
        "- Note-taking answers should guide how much private DM text space appears inside initiative/entity cards."
      ];
      return lines.join("\n");
    }

    function renderSummary() {
      completed = true;
      const profileText = buildProfileText();
      stage.innerHTML = `
        <section class="summary-layout">
          <div class="summary-panel">
            <div class="section-pill">Audit Complete</div>
            <div class="slide-kicker">Final Output</div>
            <h2 class="summary-title">Tactical System Profile Generated.</h2>
            <p class="summary-subtitle">Copy the profile below and send it back to the DM Hub reviewer. The parchment is clean, the dice are behaving, and the laptop plus DM workflow have confessed enough.</p>
            <label class="sr-only" for="summaryOutput">Generated tactical system profile</label>
            <textarea class="summary-output" id="summaryOutput">${escapeHtml(profileText)}</textarea>
            <div class="button-row" style="margin-top:14px;">
              <button class="btn primary" type="button" id="copyBtn">Copy Profile</button>
              <button class="btn" type="button" id="downloadBtn">Download .txt</button>
              <button class="btn" type="button" id="editBtn">Review Answers</button>
            </div>
            <div class="copy-status" id="copyStatus"></div>
          </div>
          <aside class="summary-side">
            <div class="mini-card">
              <h3>Scene Archive</h3>
              <p>The audit used cropped scene cards instead of giant collage boards. Civilized. Finally.</p>
            </div>
            <div class="mini-gallery">
              ${gallery.slice(0, 8).map(item => `<img src="${item.src}" alt="${escapeHtml(item.alt)}" />`).join("")}
            </div>
            <div class="mini-card">
              <h3>Audit Runes</h3>
              <p>These answers help estimate display comfort, browser support, input needs, thermal risk, combat flow, Player View behavior, map tooling, and private-note screen space.</p>
              <div class="dragon-runes">
                <span class="rune">Display</span><span class="rune">Browser</span><span class="rune">Thermals</span><span class="rune">Input</span><span class="rune">Combat</span><span class="rune">Maps</span><span class="rune">Notes</span>
              </div>
            </div>
          </aside>
        </section>
      `;
      document.getElementById("copyBtn").addEventListener("click", copyProfile);
      document.getElementById("downloadBtn").addEventListener("click", downloadProfile);
      document.getElementById("editBtn").addEventListener("click", () => {
        completed = false;
        currentIndex = 0;
        renderSlide();
      });
      updateChrome();
    }

    async function copyProfile() {
      const output = document.getElementById("summaryOutput");
      const copyStatus = document.getElementById("copyStatus");
      const text = output ? output.value : buildProfileText();

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          output.focus();
          output.select();
          document.execCommand("copy");
        }
        if (copyStatus) copyStatus.textContent = "Copied to clipboard. Send the scroll.";
      } catch (error) {
        if (copyStatus) copyStatus.textContent = "Clipboard blocked. Select the text and copy it manually.";
      }
    }

    function downloadProfile() {
      const output = document.getElementById("summaryOutput");
      const text = output ? output.value : buildProfileText();
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "dm-hub-tactical-system-workflow-profile.txt";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function saveLocal() {
      try { localStorage.setItem("dmHubTacticalSystemWorkflowAuditAnswers", JSON.stringify(answers)); } catch (error) {}
    }

    function loadLocal() {
      try {
        const saved = localStorage.getItem("dmHubTacticalSystemWorkflowAuditAnswers");
        if (saved) answers = JSON.parse(saved) || {};
      } catch (error) {
        answers = {};
      }
    }

    function resetAudit() {
      answers = {};
      currentIndex = 0;
      completed = false;
      try { localStorage.removeItem("dmHubTacticalSystemWorkflowAuditAnswers"); } catch (error) {}
      renderSlide();
      microStatus.textContent = "Audit reset. The slate is clean. Suspiciously clean.";
    }

    nextBtn.addEventListener("click", () => {
      if (completed) {
        copyProfile();
        return;
      }
      if (!validateCurrent()) return;
      if (currentIndex < questions.length - 1) {
        currentIndex += 1;
        renderSlide();
      } else {
        renderSummary();
      }
    });

    backBtn.addEventListener("click", () => {
      if (completed) {
        completed = false;
        currentIndex = questions.length - 1;
        renderSlide();
        return;
      }
      if (currentIndex > 0) {
        currentIndex -= 1;
        renderSlide();
      }
    });

    resetBtn.addEventListener("click", resetAudit);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        const active = document.activeElement;
        const isTextarea = active && active.tagName === "TEXTAREA";
        if (!isTextarea) {
          event.preventDefault();
          nextBtn.click();
        }
      }
    });

    loadLocal();
    renderSlide();
  </script>
</body>
</html>
